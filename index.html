<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK Mission: Misteri Dompet</title>
    <!-- Tailwind CSS untuk styling responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Space Grotesk memberikan kesan futuristik namun tetap ramah -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #020617; /* Slate 950 */
            /* Background Grid Futuristik */
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            color: #e2e8f0;
        }

        /* Container buku bergaya antarmuka Hologram / Cyberpunk */
        .book-container {
            perspective: 1500px;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2), inset 0 0 20px rgba(6, 182, 212, 0.1);
            border-radius: 1.5rem;
            background: linear-gradient(145deg, #0f172a, #1e293b);
            position: relative;
        }

        /* Garis pemisah tengah yang menyala */
        @media (min-width: 768px) {
            .book-container::after {
                content: '';
                position: absolute;
                top: 5%;
                bottom: 5%;
                left: 41.666667%; /* Menyesuaikan batas w-5/12 */
                width: 2px;
                background: linear-gradient(to bottom, transparent, rgba(6, 182, 212, 0.8), transparent);
                box-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
                z-index: 10;
            }
        }

        /* Animasi Transisi Halaman (Glitch / Flip Hologram) */
        .page-transition {
            animation: holoTurn 0.5s ease-in-out;
        }

        @keyframes holoTurn {
            0% { transform: scale(1); filter: brightness(1) hue-rotate(0deg); opacity: 1; }
            50% { transform: scale(0.98); filter: brightness(1.5) hue-rotate(90deg); opacity: 0; }
            50.1% { transform: scale(0.98); filter: brightness(1.5) hue-rotate(-90deg); opacity: 0; }
            100% { transform: scale(1); filter: brightness(1) hue-rotate(0deg); opacity: 1; }
        }

        /* Tombol Futuristik */
        .btn-neon {
            background: transparent;
            border: 2px solid;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-neon::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.4s ease;
        }

        .btn-neon:hover::before {
            left: 100%;
        }

        .btn-neon:active {
            transform: scale(0.95);
        }

        /* Warna khusus tombol neon */
        .neon-blue { border-color: #0ea5e9; color: #0ea5e9; box-shadow: 0 0 10px rgba(14, 165, 233, 0.3); }
        .neon-blue:hover { background: #0ea5e9; color: #020617; box-shadow: 0 0 20px rgba(14, 165, 233, 0.6); }

        .neon-green { border-color: #10b981; color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .neon-green:hover { background: #10b981; color: #020617; box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); }

        .neon-pink { border-color: #ec4899; color: #ec4899; box-shadow: 0 0 10px rgba(236, 72, 153, 0.3); }
        .neon-pink:hover { background: #ec4899; color: #020617; box-shadow: 0 0 20px rgba(236, 72, 153, 0.6); }

        .neon-purple { border-color: #8b5cf6; color: #8b5cf6; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
        .neon-purple:hover { background: #8b5cf6; color: #020617; box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); }

        .pulse {
            animation: pulse-holo 1.5s infinite;
        }
        @keyframes pulse-holo {
            0% { box-shadow: 0 0 10px rgba(236, 72, 153, 0.4); }
            50% { box-shadow: 0 0 25px rgba(236, 72, 153, 0.8), inset 0 0 10px rgba(236, 72, 153, 0.5); }
            100% { box-shadow: 0 0 10px rgba(236, 72, 153, 0.4); }
        }
        
        /* Tombol Pilihan Branching */
        .btn-choice {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #f59e0b;
            color: #fbd38d;
            transition: all 0.3s;
        }
        .btn-choice:hover {
            background: #f59e0b;
            color: #0f172a;
            box-shadow: 0 0 15px #f59e0b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Book Area (Lebih Lebar) -->
    <main id="book" class="book-container w-full max-w-6xl flex flex-col md:flex-row overflow-hidden border border-cyan-800">
        
        <!-- Gambar Ilustrasi (Dibuat sedikit lebih kecil porsinya untuk memberi ruang teks) -->
        <div class="w-full md:w-5/12 bg-slate-900 p-4 md:p-8 flex items-center justify-center relative">
            <!-- Overlay efek scanline -->
            <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0),rgba(255,255,255,0.05))] opacity-20 pointer-events-none"></div>
            
            <img id="page-image" src="" alt="Ilustrasi Misi" class="w-full h-64 md:h-[450px] object-cover rounded-xl border border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.3)] transition-opacity duration-300">
        </div>

        <!-- Teks Cerita (Area dibuat lebih besar) -->
        <div class="w-full md:w-7/12 p-6 md:p-12 flex flex-col justify-center bg-slate-900/90 relative">
            <div class="absolute top-0 right-0 p-4 opacity-30 text-cyan-400 font-mono text-xs">SPARK_OS // MISSION_DATA_LINK</div>
            
            <h2 id="story-title" class="text-2xl md:text-3xl font-bold text-cyan-400 mb-6 drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]">Memuat Modul...</h2>
            
            <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700 shadow-inner min-h-[220px]">
                <p id="page-text" class="text-lg md:text-2xl text-slate-300 leading-relaxed tracking-wide"></p>
                
                <!-- Area Pilihan (Branching) -->
                <div id="choices-container" class="mt-8 flex flex-col gap-4 hidden">
                    <!-- Tombol pilihan dimuat oleh JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Navigation & Controls (Panel Bawah Futuristik) -->
    <nav class="w-full max-w-6xl mt-8 flex flex-wrap justify-center gap-4 bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700 shadow-[0_10px_30px_-10px_rgba(0,0,0,0.5)]">
        <button id="btn-prev" class="btn-neon neon-blue flex-1 min-w-[140px] font-bold py-3 px-4 rounded-lg">
            ◀ System.Prev
        </button>
        
        <button id="btn-speak" class="btn-neon neon-pink flex-1 min-w-[140px] font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
            Audio.Play
        </button>
        
        <button id="btn-auto" class="btn-neon neon-purple flex-1 min-w-[140px] font-bold py-3 px-4 rounded-lg">
            Auto_Mode: OFF
        </button>

        <button id="btn-next" class="btn-neon neon-green flex-1 min-w-[140px] font-bold py-3 px-4 rounded-lg">
            System.Next ▶
        </button>
    </nav>

    <!-- Progress Text UI Futuristik -->
    <div class="mt-6 text-cyan-500 font-mono text-sm tracking-widest flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
        DATA_SECTOR: <span id="page-indicator" class="font-bold text-white ml-1">1 / ?</span>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Data Cerita Baru (Misi 1: Misteri Dompet di Bawah Bangku)
        // Atribut nextId digunakan untuk mengatur aliran cerita
        const storyPages = [
            // Jalur Utama
            {
                id: 0,
                title: "Halaman 1: Istirahat yang Ramai",
                text: "Bel istirahat berbunyi nyaring. Adit segera menuju kantin untuk membeli minuman dingin. Suasana sangat ramai, para siswa Fase C berlarian menuju meja favorit mereka. Adit duduk di pojok bangku kayu yang agak gelap di sudut kantin.",
                image: "https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&w=800&q=80", // Kantin/sekolah
                nextId: 1
            },
            {
                id: 1,
                title: "Halaman 2: Sesuatu yang Berkilau",
                text: "Saat hendak berdiri, ujung sepatu Adit menyentuh benda keras di bawah bangku. Ia membungkuk dan menemukan sebuah dompet kulit berwarna cokelat yang cukup tebal. Tidak ada seorang pun yang melihat Adit mengambilnya.",
                image: "https://images.unsplash.com/photo-1627384113743-6bd5a479fffd?auto=format&fit=crop&w=800&q=80", // Dompet kulit
                nextId: 2
            },
            {
                id: 2,
                title: "Halaman 3: Isi Dompet",
                text: "Adit membuka sedikit dompet itu. Matanya terbelalak melihat tumpukan uang di dalamnya. Jumlahnya cukup banyak. Di kepalanya terlintas bayangan sepatu bola baru dengan logo klub favoritnya yang selama ini hanya bisa ia lihat di etalase toko.",
                image: "https://images.unsplash.com/photo-1511886929837-354d827aae26?auto=format&fit=crop&w=800&q=80", // Uang / Sepatu
                nextId: 3
            },
            {
                id: 3,
                title: "Halaman 4: Perang Batin",
                text: "\"Kalau aku ambil satu lembar saja, pemiliknya mungkin tidak akan sadar,\" bisik sebuah suara di hatinya. Namun, ia teringat materi literasi karakter di kelas tentang integritas. Dompet itu terasa sangat berat di tangannya.",
                image: "https://images.unsplash.com/photo-1499209974431-9dddcece7f88?auto=format&fit=crop&w=800&q=80", // Anak merenung
                nextId: 4
            },
            {
                id: 4,
                title: "Halaman 5: Siapa Pemiliknya?",
                text: "Adit melihat Pak Jajang, penjual kantin, tampak panik mencari-cari sesuatu di dekat meja kasir. Di sisi lain, Adit juga melihat seorang adik kelas yang tadi duduk di bangku yang sama sedang menangis sesenggukan.",
                image: "https://images.unsplash.com/photo-1577896851231-70ef18881754?auto=format&fit=crop&w=800&q=80", // Orang dewasa/guru mencari sesuatu
                nextId: 5
            },
            {
                id: 5,
                title: "Halaman 6: Titik Persimpangan",
                text: "Adit harus segera mengambil keputusan sebelum bel masuk berbunyi. Apa yang harus dilakukan Adit?",
                image: "https://images.unsplash.com/photo-1519682577862-22b62b24e493?auto=format&fit=crop&w=800&q=80", // Percabangan jalan/pilihan
                choices: [
                    { text: "Pilihan A: Segera mendatangi meja guru untuk melaporkan penemuan dompet.", targetId: 6 },
                    { text: "Pilihan B: Menyimpan dompet itu dulu di tas untuk dipikirkan nanti sepulang sekolah.", targetId: 10 }
                ]
                // Tidak ada nextId karena harus memilih
            },
            
            // --- JALUR A (Kejujuran) ---
            {
                id: 6,
                title: "Halaman 7A: Ruang Guru",
                text: "Adit berlari menuju ruang guru dan menyerahkan dompet itu kepada Bu Guru. Bu Guru segera mengumumkan penemuan tersebut melalui pengeras suara sekolah.",
                image: "https://images.unsplash.com/photo-1580582932707-520aed937b7b?auto=format&fit=crop&w=800&q=80", // Ruang guru / pengumuman
                nextId: 7
            },
            {
                id: 7,
                title: "Halaman 8A: Pemilik yang Lega",
                text: "Ternyata dompet itu milik Pak Jajang. Uang di dalamnya adalah uang modal untuk belanja bahan kantin esok hari. Pak Jajang sangat berterima kasih sampai matanya berkaca-kaca.",
                image: "https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=800&q=80", // Senyum terima kasih
                nextId: 8
            },
            {
                id: 8,
                title: "Halaman 9A: Kebanggaan Sejati",
                text: "Adit merasa dadanya lapang. Meski ia tidak mendapatkan sepatu baru, ia mendapatkan rasa hormat dari teman-temannya dan kepercayaan dari gurunya.",
                image: "https://images.unsplash.com/photo-1601662528567-526cd06f6582?auto=format&fit=crop&w=800&q=80", // Dada lapang/siluet bangga
                nextId: 9
            },
            {
                id: 9,
                title: "Halaman 10A: Misi Berhasil",
                text: "Selamat! Kamu telah menunjukkan karakter jujur. Di aplikasi SPARK, kamu mendapatkan Badge Integritas Emas. Kejujuran adalah mahkota setiap murid yang hebat.",
                image: "https://images.unsplash.com/photo-1589828135898-31627eb188fa?auto=format&fit=crop&w=800&q=80" // Medali/Badge
                // Halaman Terakhir, tidak ada nextId
            },

            // --- JALUR B (Menunda Kejujuran) ---
            {
                id: 10,
                title: "Halaman 7B: Beban di Tas",
                text: "Adit memasukkan dompet ke dalam tasnya. Sepanjang pelajaran matematika, ia tidak bisa konsentrasi. Setiap kali menatap tasnya, jantungnya berdegup kencang karena takut ketahuan.",
                image: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=800&q=80", // Tas sekolah / belajar cemas
                nextId: 11
            },
            {
                id: 11,
                title: "Halaman 8B: Kabar Sedih",
                text: "Saat pulang sekolah, Adit mendengar kabar bahwa Pak Jajang sangat sedih karena kehilangan modal dagangnya dan terpaksa menutup kantin sementara. Rasa bersalah mulai menghantui Adit.",
                image: "https://images.unsplash.com/photo-1502598818465-b1e065dc352c?auto=format&fit=crop&w=800&q=80", // Suasana sedih / kantin tutup
                nextId: 12
            },
            {
                id: 12,
                title: "Halaman 9B: Penyesalan Terlambat",
                text: "Adit akhirnya mengembalikan dompet itu keesokan harinya dengan perasaan malu yang luar biasa. Ia meminta maaf, namun ia merasa telah kehilangan waktu satu hari untuk menjadi orang jujur.",
                image: "https://images.unsplash.com/photo-1594322436404-5a0526db4d13?auto=format&fit=crop&w=800&q=80", // Anak menyesal menunduk
                nextId: 13
            },
            {
                id: 13,
                title: "Halaman 10B: Pelajaran Berharga",
                text: "Kamu menyelesaikan misi, namun mendapatkan Badge Penyesalan. Belajarlah bahwa menunda kejujuran hanya akan menambah beban di hati. Cobalah lebih berani di misi berikutnya!",
                image: "https://images.unsplash.com/photo-1516580979402-990e7da3c5c4?auto=format&fit=crop&w=800&q=80" // Refleksi / Cermin
                // Halaman Terakhir, tidak ada nextId
            }
        ];

        // State Variables
        let isAutoPlay = false;
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let pageSequence = []; // Menyimpan riwayat halaman

        // DOM Elements
        const bookElement = document.getElementById('book');
        const pageImage = document.getElementById('page-image');
        const storyTitle = document.getElementById('story-title');
        const pageText = document.getElementById('page-text');
        const choicesContainer = document.getElementById('choices-container');
        const pageIndicator = document.getElementById('page-indicator');
        
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnSpeak = document.getElementById('btn-speak');
        const btnAuto = document.getElementById('btn-auto');

        // Fungsi inisialisasi
        function initBook() {
            pageSequence = [0];
            renderPage(0, false);
        }

        // Fungsi merender halaman
        function renderPage(pageId, animate = true) {
            const page = storyPages.find(p => p.id === pageId);
            if (!page) return;

            stopSpeaking();

            if (animate) {
                bookElement.classList.remove('page-transition');
                void bookElement.offsetWidth; // Trigger reflow
                bookElement.classList.add('page-transition');
            }

            // Update Konten (Jeda sedikit agar pas dengan animasi visual)
            setTimeout(() => {
                pageImage.src = page.image;
                storyTitle.innerText = page.title || "Misi 1: Misteri Dompet di Bawah Bangku";
                pageText.innerText = page.text;
                
                // Atur Pilihan (Branching)
                choicesContainer.innerHTML = '';
                if (page.choices && page.choices.length > 0) {
                    choicesContainer.classList.remove('hidden');
                    btnNext.style.display = 'none'; 
                    
                    if (isAutoPlay) toggleAutoPlay(); // Berhenti otomatis di titik persimpangan

                    page.choices.forEach(choice => {
                        const btn = document.createElement('button');
                        btn.className = "btn-choice font-bold py-4 px-6 rounded-lg text-left text-sm md:text-lg w-full flex items-center gap-3";
                        btn.innerHTML = `<span class="bg-amber-500 text-slate-900 rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0 text-sm">▶</span> ${choice.text}`;
                        btn.onclick = () => goToPage(choice.targetId);
                        choicesContainer.appendChild(btn);
                    });
                } else {
                    choicesContainer.classList.add('hidden');
                    // Sembunyikan tombol next jika tidak ada nextId (akhir cerita)
                    if (page.nextId === undefined) {
                         btnNext.style.display = 'none';
                    } else {
                         btnNext.style.display = 'block';
                    }
                }

                // Update status tombol navigasi Prev
                btnPrev.disabled = pageSequence.length <= 1;
                btnPrev.style.opacity = pageSequence.length <= 1 ? '0.3' : '1';
                btnPrev.style.cursor = pageSequence.length <= 1 ? 'not-allowed' : 'pointer';

                // Indikator Halaman (berdasarkan panjang array histori)
                pageIndicator.innerText = `${pageSequence.length}`;

                // Autoplay logic
                if (isAutoPlay) {
                    speakText(page.text, true);
                }
            }, animate ? 250 : 0); 
        }

        // Fungsi navigasi
        function goToPage(pageId) {
            pageSequence.push(pageId);
            renderPage(pageId);
        }

        function nextPage() {
            const currentPageId = pageSequence[pageSequence.length - 1];
            const page = storyPages.find(p => p.id === currentPageId);
            
            if (page.choices) return; // Tidak bisa next biasa, harus klik tombol pilihan
            if (page.nextId !== undefined) { 
                goToPage(page.nextId);
            }
        }

        function prevPage() {
            if (pageSequence.length > 1) {
                pageSequence.pop(); 
                const prevPageId = pageSequence[pageSequence.length - 1];
                
                if (isAutoPlay) toggleAutoPlay();
                renderPage(prevPageId);
            }
        }

        // Fitur Text-to-Speech
        function speakText(text, fromAutoPlay = false) {
            if (!synth) return console.log("Browser tidak mendukung Speech API");
            
            stopSpeaking();

            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'id-ID'; 
            currentUtterance.rate = 0.95; // Kecepatan sedikit disesuaikan
            currentUtterance.pitch = 1.0; 

            btnSpeak.classList.add('pulse');

            currentUtterance.onend = () => {
                btnSpeak.classList.remove('pulse');
                
                if (isAutoPlay && fromAutoPlay) {
                    const currentPageId = pageSequence[pageSequence.length - 1];
                    const page = storyPages.find(p => p.id === currentPageId);
                    
                    setTimeout(() => {
                        if (isAutoPlay && !page.choices && page.nextId !== undefined) {
                            nextPage();
                        } else if (page.choices || page.nextId === undefined) {
                            toggleAutoPlay(); // Matikan auto-play jika di persimpangan / tamat
                        }
                    }, 1500); // Jeda 1.5 detik
                }
            };

            currentUtterance.onerror = () => {
                btnSpeak.classList.remove('pulse');
            }

            synth.speak(currentUtterance);
        }

        function stopSpeaking() {
            if (synth.speaking) {
                synth.cancel();
                btnSpeak.classList.remove('pulse');
            }
        }

        // Fitur Mode Otomatis
        function toggleAutoPlay() {
            isAutoPlay = !isAutoPlay;
            
            if (isAutoPlay) {
                btnAuto.innerText = "Auto_Mode: ON";
                btnAuto.classList.add('bg-purple-600', 'text-white');
                
                const currentPageId = pageSequence[pageSequence.length - 1];
                const text = storyPages.find(p => p.id === currentPageId).text;
                speakText(text, true);
            } else {
                btnAuto.innerText = "Auto_Mode: OFF";
                btnAuto.classList.remove('bg-purple-600', 'text-white');
                stopSpeaking();
            }
        }

        // Event Listeners
        btnNext.addEventListener('click', () => {
            if(isAutoPlay) toggleAutoPlay(); 
            nextPage();
        });
        
        btnPrev.addEventListener('click', prevPage);
        
        btnSpeak.addEventListener('click', () => {
            const currentPageId = pageSequence[pageSequence.length - 1];
            const text = storyPages.find(p => p.id === currentPageId).text;
            speakText(text, false);
        });

        btnAuto.addEventListener('click', toggleAutoPlay);

        window.addEventListener('beforeunload', stopSpeaking);

        // Mulai
        window.onload = initBook;

    </script>
</body>
</html>
